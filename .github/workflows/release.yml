name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: deadflash-linux-x64
            standard_binary: build/deadflash
            proof_binary: build/deadflash-proof
            extension: ''
          - os: windows-latest
            artifact: deadflash-windows-x64
            standard_binary: build/Release/deadflash.exe
            proof_binary: build/Release/deadflash-proof.exe
            extension: '.exe'

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Configure
        run: cmake -S . -B build -DDEADFLASH_WARNINGS_AS_ERRORS=ON -DDEADFLASH_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Unit and integration tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Release end-to-end proof qualification
        shell: bash
        run: |
          python scripts/e2e-proof.py \
            --deadflash '${{ matrix.standard_binary }}' \
            --proof '${{ matrix.proof_binary }}' \
            --work-dir release-e2e \
            --summary release-e2e-summary.json

      - name: Qualification image reproducibility contract
        run: python scripts/test-qualification-image.py

      - name: Benchmark comparison contract
        run: python scripts/test-benchmark-comparator.py

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p dist/scripts
          cp '${{ matrix.standard_binary }}' 'dist/deadflash${{ matrix.extension }}'
          cp '${{ matrix.proof_binary }}' 'dist/deadflash-proof${{ matrix.extension }}'
          cp README.md CHANGELOG.md LICENSE dist/
          cp docs/COMMANDS.txt docs/NO_MAGIC.md docs/PROOF_FORMAT.md dist/
          cp docs/USB_QUALIFICATION.md docs/WINDOWS_MSVC_QUALIFICATION.md dist/
          cp docs/COMPARISON_RECORD_FORMAT.md docs/BENCHMARK_PROTOCOL.md dist/
          cp docs/QUALIFICATION_IMAGE.md dist/
          cp scripts/e2e-proof.py scripts/qualify-usb.py scripts/qualify-msvc.ps1 dist/scripts/
          cp scripts/make-qualification-image.py dist/scripts/
          cp scripts/add-comparison-run.py scripts/compare-benchmarks.py dist/scripts/
          cp release-e2e-summary.json dist/

      - name: Archive Linux
        if: runner.os == 'Linux'
        run: tar -C dist -czf ${{ matrix.artifact }}.tar.gz .

      - name: Archive Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\* -DestinationPath '${{ matrix.artifact }}.zip'

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create '${{ github.ref_name }}' artifacts/**/* --verify-tag --generate-notes
